<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UniCore- Contact</title>
    <meta name="UniCore- Contact" content="This is Contact Page">
    <link rel="icon" href="https://picsum.photos/200">
    <link rel="stylesheet" href="./styling/style.css">

    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="contact-wrapper">
        <h2><u>Contact University Administration</u></h2>
        <section class="phone-number">
            <h3>Phone Number</h3>
            <div class="phone-number-contact">
                <a href="tel:+20123456789">Call Us: +20 123 456 789</a>
            </div>
        </section>

        <hr>

        <section class="location-info">
            <h3>Our Location</h3>
            <address>
                UniCore University Main Campus<br>
                ElMajara Workspace<br>
                Zagazig, Egypt
            </address>
        </section>

        <hr>

        <section class="feedback-form">
            <h3>Send us your Feedback</h3>
            <form action="#">
                <label for="feedback">Message:</label>
                <textarea id="feedback" name="feedback" rows="4" placeholder="Enter your feedback here..."></textarea>
                <button type="submit" class="btn-submit">Submit Feedback</button>
            </form>
        </section>

        <footer class="contact-footer">
            <p>Need direct help? 
                <a href="mailto:momoformostafa@gmail.com">
                    Email the Admin
                </a>
            </p>
            <a href="./index.html">← Back to Main Page</a>
        </footer>
    </div>
</body>
</html>
